    body {

    * {
      font-family: 'Poppins', sans-serif;

    .font-display {
      font-family: 'Cormorant Garamond', serif;
    }

    .hero-section {
      position: relative;
      height: 85%;
      min-height: 500px;
      overflow: hidden;
    }

    .hero-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(248, 180, 196, 0.7) 0%, rgba(212, 184, 224, 0.6) 50%, rgba(168, 220, 217, 0.5) 100%);
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 2;
    }

    .nav-btn {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .nav-btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .nav-btn:hover::before {
      width: 300px;
      height: 300px;
    }

    .nav-btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    }

    .product-card,
    .course-card {
      transition: all 0.4s ease;
    }

    .product-card:hover,
    .course-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
    }

    .btn-primary {
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-primary::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      transform: translate(-50%, -50%);
      transition: width 0.4s, height 0.4s;
    }

    .btn-primary:hover::after {
      width: 300px;
      height: 300px;
    }

    .btn-primary:hover {
      transform: scale(1.05);
    }

    .floating-whatsapp {
      animation: float 3s ease-in-out infinite;
      box-shadow: 0 10px 30px rgba(37, 211, 102, 0.4);
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-15px);
      }
    }

    .fade-in {
      animation: fadeIn 1s ease-out forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    .slide-up {
      animation: slideUp 0.8s ease-out forwards;
      opacity: 0;
      transform: translateY(50px);
    }

    @keyframes slideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .mobile-menu {
      transform: translateX(-100%);
      transition: transform 0.3s ease-in-out;
    }

    .mobile-menu.active {
      transform: translateX(0);
    }

    @media (max-width: 768px) {
      .hero-section {
        min-height: 400px;
      }
    }
  </style>

  <script>
    // Form validation and submission
    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const togglePasswordBtn = document.getElementById('togglePassword');
    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');
    const successMessage = document.getElementById('successMessage');
    const errorMessage = document.getElementById('errorMessage');
    const errorText = document.getElementById('errorText');

    // Toggle password visibility
    togglePasswordBtn.addEventListener('click', () => {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      togglePasswordBtn.innerHTML = type === 'password'
        ? '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>'
        : '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-4.803m5.596-3.856a3.375 3.375 0 11-4.753 4.753m4.753-4.753L3.596 3.039m10.318 10.318L3.039 3.596" /></svg>';
    });

    // Show backend error and preserve email from query string
    const params = new URLSearchParams(window.location.search);
    const backendError = params.get('error');
    const backendEmail = params.get('email');

    if (backendError === '1') {
      errorMessage.classList.remove('hidden');
      errorText.textContent = 'datos incorrectos';
    }

    if (backendEmail) {
      emailInput.value = backendEmail;
    }

    // Form submission (frontend validation only)
    loginForm.addEventListener('submit', (e) => {
      emailError.classList.add('hidden');
      passwordError.classList.add('hidden');
      successMessage.classList.add('hidden');
      errorMessage.classList.add('hidden');

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(emailInput.value)) {
        e.preventDefault();
        emailError.classList.remove('hidden');
        return;
      }

      if (passwordInput.value.length < 1) {
        e.preventDefault();
        passwordError.classList.remove('hidden');
        return;
      }

    });
  </script>
